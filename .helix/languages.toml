# --- NIX Language Configuration ---
[[language]]
name = "nix"
scope = "source.nix"
file-types = ["nix"]
shebangs = ["nix-shell"]
roots = ["flake.nix", "shell.nix", "default.nix", ".git"]
comment-token = "#"
indent = { tab-width = 2, unit = "  " }
language-servers = ["nixd"]
formatter = { command = "nixfmt" }
auto-format = true

[language-server.nixd]
command = "nixd"
config.nixd.eval.flags = ["--impure"]
config.nixd.nixpkgs.expr = "let lock = builtins.fromJSON (builtins.readFile ./flake.lock); in import (builtins.getFlake (\"github:NixOS/nixpkgs/\" + lock.nodes.nixpkgs_4.locked.rev)) { system = \"x86_64-linux\"; }"
config.nixd.options.nixos.expr = "let lock = builtins.fromJSON (builtins.readFile ./flake.lock); nixpkgs = builtins.getFlake (\"github:NixOS/nixpkgs/\" + lock.nodes.nixpkgs_4.locked.rev); in (nixpkgs.lib.nixosSystem { system = \"x86_64-linux\"; modules = [ (builtins.getFlake (\"github:Mic92/sops-nix/\" + lock.nodes.sops-nix.locked.rev)).nixosModules.sops (builtins.getFlake (\"github:nix-community/impermanence/\" + lock.nodes.impermanence.locked.rev)).nixosModules.impermanence (builtins.getFlake (\"github:nix-community/disko/\" + lock.nodes.disko.locked.rev)).nixosModules.disko ]; }).options"
config.nixd.options.home-manager.expr = "let lock = builtins.fromJSON (builtins.readFile ./flake.lock); hm = builtins.getFlake (\"github:nix-community/home-manager/\" + lock.nodes.home-manager.locked.rev); nixpkgs = builtins.getFlake (\"github:NixOS/nixpkgs/\" + lock.nodes.nixpkgs_4.locked.rev); in (hm.lib.homeManagerConfiguration { pkgs = import nixpkgs { system = \"x86_64-linux\"; }; modules = [{ home.stateVersion = \"24.11\"; home.username = \"dummy\"; home.homeDirectory = \"/home/dummy\"; }]; }).options"
# --- TOML Language Configuration ---
[[language]]
name = "toml"
scope = "source.toml"
file-types = ["toml"]
roots = ["Cargo.toml", "pyproject.toml", ".git"]
comment-token = "#"
indent = { tab-width = 2, unit = "  " }
language-servers = ["taplo"]
formatter = { command = "taplo", args = ["fmt", "-"] }

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]


# --- Bash/Shell Language Configuration ---
[[language]]
name = "bash"
scope = "source.bash"
file-types = ["sh", "bash", "zsh", ".bashrc", ".zshrc"]
shebangs = ["sh", "bash", "zsh"]
roots = [".git"]
comment-token = "#"
indent = { tab-width = 2, unit = "  " }
language-servers = ["bash-language-server"]
formatter = { command = "shfmt", args = ["-"] }

[language-server.bash-language-server]
command = "bash-language-server"
args = ["start"]

# --- JSON Language Configuration ---
[[language]]
name = "json"
scope = "source.json"
file-types = ["json", "jsonc"]
roots = [".git"]
indent = { tab-width = 2, unit = "  " }
language-servers = ["vscode-json-language-server"]
formatter = { command = "prettier", args = ["--parser", "json"] }
auto-format = true

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]
